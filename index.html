<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rexby Explorer</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1 id="guide-title">Rexby Explorer</h1>
    <p class="subtitle">Explore unique things to do across Bulgaria</p>
    <div class="guide-switcher" id="guide-switcher"></div>
  </header>

  <div class="controls" id="controls" style="display:none;">
    <div class="search-sort-row">
      <input type="text" class="search-box" id="search" placeholder="Search by title or description...">
      <select class="sort-select" id="sort">
        <option value="title">Sort by Title</option>
        <option value="category">Sort by Category</option>
        <option value="duration">Sort by Duration</option>
        <option value="distance">Sort by Distance</option>
      </select>
      <span class="item-count" id="item-count"></span>
    </div>
    <div class="geo-row">
      <label>Near:</label>
      <select class="geo-select" id="geo-city">
        <option value="">Anywhere</option>
      </select>
      <label>Radius:</label>
      <select class="geo-radius" id="geo-radius">
        <option value="25">25 km</option>
        <option value="50">50 km</option>
        <option value="75">75 km</option>
        <option value="100" selected>100 km</option>
        <option value="150">150 km</option>
        <option value="200">200 km</option>
        <option value="300">300 km</option>
      </select>
      <span class="geo-info" id="geo-info"></span>
      <button class="geo-clear" id="geo-clear" style="display:none" onclick="clearGeo()">Clear</button>
    </div>
    <div>
      <button class="cat-toggle" id="cat-toggle" onclick="toggleCats()">
        <span>Categories</span>
        <span class="arrow">&#9660;</span>
        <span class="cat-active-label" id="cat-active-label"></span>
      </button>
      <div class="cat-accordion" id="cat-accordion">
        <div class="category-filters" id="category-filters"></div>
      </div>
    </div>
  </div>

  <div id="loading" class="loading">
    <div class="spinner"></div>
    <p>Loading things to do...</p>
  </div>
  <div id="error" class="error-msg" style="display:none;"></div>
  <div class="grid" id="grid"></div>

  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal">
      <button class="modal-close" onclick="closeModal()">&times;</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <script src="js/i18n.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
